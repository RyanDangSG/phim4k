<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RyanPhim - Thế Giới Điện Ảnh 4K</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Đổi màu theme của Custom Player sang Đỏ Netflix */
        :root { --primary: #e50914; --bg: #141414; --text-gray: #b3b3b3; --plyr-color-main: #e50914; }
        body { background-color: var(--bg); color: #fff; font-family: 'Montserrat', sans-serif; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .snap-x { scroll-snap-type: x mandatory; }
        .snap-center { scroll-snap-align: center; }

        .nav-link { color: #e5e5e5; font-weight: 500; font-size: 14px; transition: color 0.3s; cursor: pointer; }
        .nav-link:hover, .nav-link.active { color: #fff; font-weight: 700; }
        
        .dropdown:hover .dropdown-menu { display: grid; opacity: 1; transform: translateY(0); pointer-events: auto; }
        .dropdown-menu {
            display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s;
            position: absolute; top: 100%; left: 0;
            background: rgba(0, 0, 0, 0.95); border-top: 2px solid var(--primary);
            padding: 20px; grid-template-columns: repeat(3, 1fr); gap: 15px; min-width: 400px; z-index: 100;
        }
        .dropdown-item { color: #b3b3b3; font-size: 13px; transition: 0.2s; display: block; cursor: pointer; }
        .dropdown-item:hover { color: var(--primary); }

        .movie-card { transition: transform 0.3s, z-index 0.3s; }
        @media (hover: hover) { 
            .movie-card:hover { transform: scale(1.05); z-index: 10; } 
            .movie-card:hover .play-icon { opacity: 1; }
        }
        
        :focus { outline: 3px solid var(--primary) !important; transform: scale(1.05) !important; z-index: 50 !important; border-radius: 4px; box-shadow: 0 0 20px rgba(229,9,20,0.5); }
        
        .page-btn {
            width: 40px; height: 40px; display: flex; align-items: center; justify-content: center;
            background: rgba(255,255,255,0.1); border-radius: 4px; font-weight: 600; transition: 0.2s; cursor: pointer;
        }
        .page-btn:hover, .page-btn.active { background: var(--primary); color: #fff; }
    </style>
</head>
<body class="bg-[#141414] min-h-screen flex flex-col">

            <div class="flex items-center gap-8">
                <img src="image_0.png" alt="RyanPhim Logo" class="h-10 md:h-12 w-auto cursor-pointer hover:opacity-90 transition" onclick="showHome()">
                
                <nav class="hidden lg:flex items-center gap-6">
                    <a onclick="showHome()" class="nav-link active">Trang chủ</a>
                    <a onclick="showHistory()" class="nav-link text-yellow-500 font-bold"><i class="fas fa-history mr-1"></i> Lịch Sử</a>

                    <div class="dropdown relative group py-4">

                    </div>
                    <a onclick="showCategory('danh-sach/phim-bo', 'Phim Bộ')" class="nav-link">Phim Bộ</a>
                    <a onclick="showCategory('danh-sach/phim-le', 'Phim Lẻ')" class="nav-link">Phim Lẻ</a>
                </nav>
            </div>

            <div class="flex items-center gap-5">
                <div class="hidden md:flex items-center border border-white/30 bg-black/50 px-3 py-1.5 rounded-sm transition focus-within:border-white focus-within:bg-black/80">

        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <img src="image_0.png" alt="RyanPhim" class="h-8 w-auto">
            <button onclick="toggleMobileMenu()" class="text-white text-2xl"><i class="fas fa-times"></i></button>
        </div>

            <div onclick="toggleAccordion('mobCountry')" class="flex justify-between items-center cursor-pointer hover:text-[var(--primary)]">

    <div id="menuBackdrop" onclick="toggleMobileMenu()" class="fixed inset-0 bg-black/80 z-[55] hidden backdrop-blur-sm"></div>

        <button onclick="mobileSearch()" class="text-[#e50914] font-bold px-3 uppercase">Tìm</button>
        <button onclick="toggleSearchOverlay()" class="text-white px-2"><i class="fas fa-times"></i></button>

    <main class="flex-grow">
        
        <section id="playerArea" class="hidden bg-black relative z-40 mb-10 pt-16 md:pt-20">
            <div class="container mx-auto px-0 md:px-4">
                <div class="aspect-video w-full bg-black shadow-2xl md:rounded-xl overflow-hidden border border-white/10 relative group">

                    <iframe id="backupIframe" class="w-full h-full hidden" frameborder="0" allowfullscreen></iframe>
                    
                </div>
                <div class="p-5 md:p-8 bg-[#181818] md:rounded-b-xl mt-[-5px]">
                    <div class="flex flex-col md:flex-row gap-8">
                        <div class="flex-1">
                            <div class="flex items-center justify-between mb-3">
                                <h2 id="playTitle" class="text-2xl md:text-4xl font-black text-white uppercase line-clamp-2"></h2>
                                <button onclick="closePlayer()" class="bg-white/10 hover:bg-white hover:text-black text-white px-4 py-2 rounded font-bold flex items-center gap-2 transition whitespace-nowrap border border-white/20 shadow-lg">
                                    <i class="fas fa-arrow-left"></i> <span class="hidden md:inline">Đóng Phim</span>

                            </div>
                            <p class="text-gray-400 text-sm md:text-base mb-6 line-clamp-4 leading-relaxed" id="playDesc"></p>
                        </div>
                        <div class="w-full md:w-96 bg-black/20 p-4 rounded-lg border border-white/5">
                            <h3 class="text-white font-bold uppercase mb-4 flex items-center gap-2"><i class="fas fa-list-ul text-[var(--primary)]"></i> Chọn tập phim</h3>

                        </div>
                    </div>
                </div>
            </div>
        </section>

        <div id="homePage" class="animate-fade-in">
            <section class="relative h-[60vh] md:h-[85vh] w-full overflow-hidden group">
                <div class="absolute inset-0 bg-gradient-to-r from-black via-black/50 to-transparent z-10"></div>
                <div class="absolute inset-0 bg-gradient-to-t from-[#141414] via-transparent to-transparent z-10"></div>
                <img id="bannerImg" src="" class="absolute inset-0 w-full h-full object-cover transition duration-[3s] scale-105 group-hover:scale-100">
                <div class="absolute inset-0 z-20 container mx-auto px-4 flex items-center">
                    <div class="max-w-2xl mt-20 md:mt-0" id="bannerContent"></div>
                </div>
            </section>

            <section class="container mx-auto px-4 relative z-40 mb-10 -mt-16 md:-mt-8">
                <div class="bg-black/80 backdrop-blur-md border border-white/10 rounded-lg p-4 shadow-2xl flex flex-col md:flex-row gap-3 items-center justify-between">
                    <div class="flex items-center gap-3 w-full md:w-auto mb-2 md:mb-0 pl-2">
                        <i class="fas fa-filter text-[#e50914] text-xl"></i>
                        <span class="text-white font-bold uppercase tracking-wider text-sm whitespace-nowrap">Lọc Phim</span>
                    </div>
                    <div class="grid grid-cols-2 md:flex gap-3 w-full">

                        <select id="filterCountry" class="bg-[#222] text-gray-300 border border-white/10 rounded px-3 py-2.5 w-full text-sm outline-none focus:border-[#e50914] cursor-pointer"><option value="">- Quốc gia -</option></select>
                        <select id="filterGenre" class="bg-[#222] text-gray-300 border border-white/10 rounded px-3 py-2.5 w-full text-sm outline-none focus:border-[#e50914] col-span-2 md:col-span-1 cursor-pointer"><option value="">- Thể loại -</option></select>
                        <button onclick="applyFilter()" class="bg-[#e50914] text-white font-bold px-8 py-2.5 rounded hover:bg-red-700 transition w-full md:w-auto col-span-2 md:col-span-1 text-sm shadow-lg tracking-widest uppercase">Lọc</button>

        <div id="categoryPage" class="hidden pt-24 md:pt-28 container mx-auto px-4 pb-20">
            <div class="flex items-center justify-between mb-8 border-b border-white/10 pb-4">
                <h2 id="catTitle" class="text-xl md:text-3xl font-black text-white uppercase tracking-wide border-l-4 border-[var(--primary)] pl-4">Danh Mục</h2>
                <button onclick="showHome()" class="text-sm text-gray-400 hover:text-white bg-white/10 px-4 py-2 rounded font-bold flex items-center gap-2 transition"><i class="fas fa-arrow-left"></i> Quay lại</button>
            </div>

            <div id="loadingSpinner" class="hidden py-20 text-center"><div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-[var(--primary)] border-t-transparent"></div></div>
        </div>

    <footer class="bg-black py-12 border-t border-gray-800 text-[#757575] text-sm">
        <div class="container mx-auto px-4 text-center">
            <img src="image_0.png" alt="RyanPhim" class="h-8 w-auto mx-auto mb-4 opacity-70">
            <p class="text-xs">© 2026 RYANPHIM. Designed by Đặng Hoàng Thiện Nhân.</p>
        </div>
    </footer>

    <script>
        const API = 'https://ophim1.com/v1/api';
        const IMG_DOMAINS = ['https://img.ophim.live/uploads/movies/', 'https://phimimg.com/upload/poster/', 'https://img.otruyenapi.com/uploads/movies/'];
        let currentEndpoint = '', currentPage = 1;

        // Biến toàn cục cho Video Player
        let plyrPlayer = null;
        let hlsInstance = null;

        async function init() {
            loadBanner();
            loadDynamicMenus();
            loadHomeRow('danh-sach/phim-moi-cap-nhat', 'Phim Mới Cập Nhật');
            loadHomeRow('the-loai/phim-chieu-rap', 'Chiếu Rạp Hot');
            loadHomeRow('danh-sach/hoat-hinh', 'Hoạt Hình Chọn Lọc');
            loadHomeRow('danh-sach/phim-bo', 'Phim Bộ Độc Quyền');
            loadHomeRow('the-loai/hanh-dong', 'Hành Động Bom Tấn');
            
            // TV Remote
            setInterval(() => {
                document.querySelectorAll('a, button, .movie-card, input, select').forEach(el => {
                    if(!el.getAttribute('tabindex')) {
                        el.setAttribute('tabindex', '0');
                        el.addEventListener('keydown', (e) => { 
                            if(e.key==='Enter' && el.tagName !== 'INPUT') { e.preventDefault(); el.click(); } 
                        });
                    }
                });
            }, 1000);
        }

        // --- CUSTOM VIDEO PLAYER LOGIC (Có Cài Đặt Chất Lượng) ---
        function loadStream(link_m3u8, link_embed) {
            const video = document.getElementById('mainVideo');
            const iframe = document.getElementById('backupIframe');

            // Reset giao diện
            iframe.classList.add('hidden');
            iframe.src = '';
            video.classList.remove('hidden');

            // Nếu web phim không cung cấp link m3u8 -> Buộc phải dùng Iframe
            if (!link_m3u8 || link_m3u8 === "") {
                useFallbackIframe(link_embed);
                return;
            }

            if (Hls.isSupported()) {
                if (hlsInstance) hlsInstance.destroy();
                hlsInstance = new Hls();
                
                // THUẬT TOÁN BẢO VỆ: Nếu OPhim chặn link m3u8 (Lỗi CORS) -> Tự nhảy về Iframe
                hlsInstance.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        console.warn("Máy chủ chặn lấy link gốc. Tự động chuyển qua Iframe dự phòng.");
                        useFallbackIframe(link_embed);
                    }
                });

                hlsInstance.loadSource(link_m3u8);
                hlsInstance.attachMedia(video);
                
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {
                    // Trích xuất các mức chất lượng (1080p, 720p...)
                    const qualities = hlsInstance.levels.map(l => l.height);
                    qualities.unshift(0); // 0 tượng trưng cho mức "Tự Động"
                    
                    if (plyrPlayer) plyrPlayer.destroy();
                    
                    plyrPlayer = new Plyr(video, {
                        controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
                        settings: ['quality', 'speed'],
                        quality: {
                            default: 0,
                            options: qualities,
                            forced: true,
                            onChange: e => {
                                if (e === 0) hlsInstance.currentLevel = -1; // Auto
                                else hlsInstance.levels.forEach((l, i) => { if (l.height === e) hlsInstance.currentLevel = i; });
                            }
                        },
                        i18n: { qualityLabel: { 0: 'Tự động' } }
                    });
                    video.play();
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Hỗ trợ riêng cho thiết bị Apple (iPhone, Safari)
                video.src = link_m3u8;
                if (plyrPlayer) plyrPlayer.destroy();
                plyrPlayer = new Plyr(video);
                video.play();
            } else {
                useFallbackIframe(link_embed);
            }
        }

        // Chạy khi bị chặn CORS hoặc không hỗ trợ
        function useFallbackIframe(link_embed) {
            const video = document.getElementById('mainVideo');
            const iframe = document.getElementById('backupIframe');
            if (hlsInstance) hlsInstance.destroy();
            if (plyrPlayer) { plyrPlayer.destroy(); plyrPlayer = null; }
            video.classList.add('hidden');
            iframe.classList.remove('hidden');
            iframe.src = link_embed;
        }

        // Đóng toàn bộ luồng mạng khi tắt phim (Tiết kiệm băng thông)
        function closePlayer() {
            document.getElementById('playerArea').classList.add('hidden');
            document.getElementById('backupIframe').src = '';
            if (hlsInstance) hlsInstance.destroy();
            if (plyrPlayer) { plyrPlayer.stop(); document.getElementById('mainVideo').src = ''; }
        }

        // --- PLAY VIDEO CLICK ---
        async function playPhim(slug) {
            try {
                const res = await fetch(`${API}/phim/${slug}`).then(r=>r.json());
                const item = res.data.item;
                saveHistory(item); 

                document.getElementById('playerArea').classList.remove('hidden');
                document.getElementById('playTitle').innerText = item.name;
                document.getElementById('playDesc').innerText = item.content.replace(/(<([^>]+)>)/gi, "");
                
                // Nút chọn tập
                document.getElementById('epList').innerHTML = item.episodes[0].server_data.map((ep, idx) => 
                    `<button onclick="loadStream('${ep.link_m3u8}', '${ep.link_embed}'); document.querySelectorAll('#epList button').forEach(b=>b.classList.remove('bg-[var(--primary)]')); this.classList.add('bg-[var(--primary)]')" class="bg-[#333] hover:bg-[var(--primary)] hover:text-white text-gray-300 px-4 py-2 text-xs font-bold rounded transition uppercase ${idx===0?'bg-[var(--primary)] text-white':''}">${ep.name}</button>`
                ).join('');
                
                // Tự động tải Tập 1 ngay khi mở khung phim
                const ep1 = item.episodes[0].server_data[0];
                loadStream(ep1.link_m3u8, ep1.link_embed);
                
                document.getElementById('playerArea').scrollIntoView({behavior:'smooth', block:'start'});
            } catch(e) { alert("Lỗi tải phim, vui lòng thử lại!"); }
        }

        // --- CÁC TÍNH NĂNG CŨ (GIỮ NGUYÊN) ---
        function applyFilter() {
            const typeObj = document.getElementById('filterType');
            const countryObj = document.getElementById('filterCountry');
            const genreObj = document.getElementById('filterGenre');
            let endpoint = ''; let titleParts = [];
            if (typeObj.value) titleParts.push(typeObj.options[typeObj.selectedIndex].text);
            if (countryObj.value) titleParts.push(countryObj.options[countryObj.selectedIndex].text);
            if (genreObj.value) titleParts.push(genreObj.options[genreObj.selectedIndex].text);
            if (titleParts.length === 0) return alert("Vui lòng chọn ít nhất 1 điều kiện lọc!");
            if (genreObj.value) endpoint = genreObj.value;
            else if (countryObj.value) endpoint = countryObj.value;
            else endpoint = typeObj.value;
            showCategory(endpoint, `LỌC: ${titleParts.join(' - ')}`);
        }

        async function searchMovies() { const rawKw = document.getElementById('searchInput').value.trim(); if (rawKw) { showCategory(`tim-kiem?keyword=${encodeURIComponent(rawKw)}`, `KẾT QUẢ TÌM KIẾM: ${rawKw.toUpperCase()}`); document.getElementById('searchInput').blur(); } else alert("Vui lòng nhập tên phim!"); }
        function mobileSearch() { const rawKw = document.getElementById('mobileSearchInput').value.trim(); if (rawKw) { toggleSearchOverlay(); showCategory(`tim-kiem?keyword=${encodeURIComponent(rawKw)}`, `KẾT QUẢ TÌM KIẾM: ${rawKw.toUpperCase()}`); document.getElementById('mobileSearchInput').blur(); } }
        
        async function loadCategoryPage() {
            const grid = document.getElementById('catGrid');
            const spinner = document.getElementById('loadingSpinner');
            const pag = document.getElementById('pagination');
            grid.innerHTML = ''; pag.innerHTML = ''; spinner.classList.remove('hidden'); window.scrollTo({ top: 0, behavior: 'smooth' });
            const separator = currentEndpoint.includes('?') ? '&' : '?';
            const apiPage1 = currentPage * 2 - 1; const apiPage2 = currentPage * 2;
            try {
                const [res1, res2] = await Promise.all([ fetch(`${API}/${currentEndpoint}${separator}page=${apiPage1}`).then(r=>r.json()).catch(()=>({})), fetch(`${API}/${currentEndpoint}${separator}page=${apiPage2}`).then(r=>r.json()).catch(()=>({})) ]);
                const movies = [...(res1.data?.items||[]), ...(res2.data?.items||[])].slice(0, 40);
                spinner.classList.add('hidden');
                if(movies.length === 0) { grid.innerHTML='<p class="col-span-full text-center text-gray-500 text-lg mt-10">Không tìm thấy phim.</p>'; return; }
                grid.innerHTML = movies.map(m => createCard(m, true)).join('');
                
                const totalItems = res1.data?.params?.pagination?.totalItems || 1000;
                const itemsPerPage = res1.data?.params?.pagination?.totalItemsPerPage || 24;
                renderPagination(Math.ceil(Math.ceil(totalItems / itemsPerPage) / 2));
            } catch { spinner.classList.add('hidden'); grid.innerHTML='<p class="col-span-full text-center text-red-500">Lỗi kết nối API.</p>'; }
        }

        function renderPagination(totalPages) {
            const pag = document.getElementById('pagination');
            if (totalPages <= 1) return;
            let html = ''; const maxDisplay = 5; 
            if (currentPage > 1) html += `<button onclick="changePage(${currentPage - 1})" class="page-btn"><i class="fas fa-chevron-left"></i></button>`;
            let start = Math.max(1, currentPage - Math.floor(maxDisplay / 2));
            let end = Math.min(totalPages, start + maxDisplay - 1);
            if (end - start < maxDisplay - 1) start = Math.max(1, end - maxDisplay + 1);
            if (start > 1) { html += `<button onclick="changePage(1)" class="page-btn">1</button>`; if (start > 2) html += `<span class="text-gray-500 px-2 flex items-end pb-2">...</span>`; }
            for (let i = start; i <= end; i++) html += `<button onclick="changePage(${i})" class="page-btn ${i === currentPage ? 'active bg-[var(--primary)] text-white border-[var(--primary)]' : ''}">${i}</button>`;
            if (end < totalPages) { if (end < totalPages - 1) html += `<span class="text-gray-500 px-2 flex items-end pb-2">...</span>`; html += `<button onclick="changePage(${totalPages})" class="page-btn">${totalPages}</button>`; }
            if (currentPage < totalPages) html += `<button onclick="changePage(${currentPage + 1})" class="page-btn"><i class="fas fa-chevron-right"></i></button>`;
            pag.innerHTML = html;
        }

        function changePage(p) { currentPage = p; loadCategoryPage(); }

        function saveHistory(movie) {
            let history = JSON.parse(localStorage.getItem('ryanphim_history')) || [];
            history = history.filter(m => m.slug !== movie.slug);
            history.unshift({ slug: movie.slug, name: movie.name, thumb_url: movie.thumb_url, year: movie.year, origin_name: movie.origin_name, episode_current: movie.episode_current, quality: movie.quality });
            if(history.length > 50) history.pop();
            localStorage.setItem('ryanphim_history', JSON.stringify(history));
        }

        function showHistory() {
            document.getElementById('homePage').classList.add('hidden'); document.getElementById('playerArea').classList.add('hidden'); document.getElementById('categoryPage').classList.remove('hidden');
            document.getElementById('catTitle').innerText = "LỊCH SỬ XEM PHIM"; document.getElementById('pagination').innerHTML = ''; 
            const grid = document.getElementById('catGrid'); const history = JSON.parse(localStorage.getItem('ryanphim_history')) || [];
            if (history.length === 0) { grid.innerHTML = '<div class="col-span-full text-center py-20"><i class="fas fa-history text-6xl text-gray-700 mb-4"></i><p class="text-xl text-gray-500">Bạn chưa xem phim nào.</p></div>'; return; }
            grid.innerHTML = history.map(m => createCard(m, true)).join('');
            document.getElementById('pagination').innerHTML = `<button onclick="clearHistory()" class="bg-red-600 text-white px-6 py-2 rounded font-bold hover:bg-red-700 transition shadow-lg tracking-widest">XÓA LỊCH SỬ</button>`;
        }
        function clearHistory() { if(confirm('Xóa toàn bộ lịch sử xem phim?')) { localStorage.removeItem('ryanphim_history'); showHistory(); } }

        function getImgUrl(u) { if(!u) return 'https://via.placeholder.com/300x450?text=No+Image'; return u.includes('http') ? u : `${IMG_DOMAINS[0]}${u}`; }
        function handleImgError(e) { const s = e.src; if(s.includes(IMG_DOMAINS[0])) e.src = s.replace(IMG_DOMAINS[0], IMG_DOMAINS[1]); else if(s.includes(IMG_DOMAINS[1])) e.src = s.replace(IMG_DOMAINS[1], IMG_DOMAINS[2]); else e.src = 'https://via.placeholder.com/300x450?text=NO+IMAGE'; }

        async function loadDynamicMenus() {
            try {
                const [resGenre, resCountry] = await Promise.all([ fetch(`${API}/the-loai`).then(r=>r.json()), fetch(`${API}/quoc-gia`).then(r=>r.json()) ]);
                const genres = resGenre.data.items; const countries = resCountry.data.items;
                document.getElementById('desktopGenre').innerHTML = genres.map(i => `<a onclick="showCategory('the-loai/${i.slug}', '${i.name}')" class="dropdown-item">${i.name}</a>`).join('');
                document.getElementById('desktopCountry').innerHTML = countries.map(i => `<a onclick="showCategory('quoc-gia/${i.slug}', '${i.name}')" class="dropdown-item">${i.name}</a>`).join('');
                document.getElementById('mobGenre').innerHTML = genres.map(i => `<a onclick="mobileNav(\`showCategory('the-loai/${i.slug}', '${i.name}')\`)" class="block hover:text-[var(--primary)] transition">${i.name}</a>`).join('');
                document.getElementById('mobCountry').innerHTML = countries.map(i => `<a onclick="mobileNav(\`showCategory('quoc-gia/${i.slug}', '${i.name}')\`)" class="block hover:text-[var(--primary)] transition">${i.name}</a>`).join('');
                document.getElementById('filterGenre').innerHTML += genres.map(i => `<option value="the-loai/${i.slug}">${i.name}</option>`).join('');
                document.getElementById('filterCountry').innerHTML += countries.map(i => `<option value="quoc-gia/${i.slug}">${i.name}</option>`).join('');
            } catch {}
        }

        async function loadBanner() {
            const res = await fetch(`${API}/home`).then(r=>r.json());
            const top = res.data.items[0]; document.getElementById('bannerImg').src = getImgUrl(top.thumb_url);
            document.getElementById('bannerContent').innerHTML = `
                <div class="animate-fade-in-up">
                    <span class="bg-[#e50914] text-white text-[10px] md:text-xs font-bold px-2 py-1 rounded uppercase tracking-wider">Top Trending</span>
                    <h2 class="text-3xl md:text-7xl font-black text-white my-4 uppercase leading-none drop-shadow-xl text-shadow line-clamp-2">${top.name}</h2>
                    <p class="text-gray-300 text-sm md:text-lg mb-6 hidden md:block max-w-xl font-medium line-clamp-2">${top.origin_name} | ${top.year}</p>
                    <button onclick="playPhim('${top.slug}')" class="bg-white text-black px-8 py-3.5 rounded font-bold hover:bg-[#e50914] hover:text-white transition uppercase text-sm flex items-center gap-2 shadow-lg"><i class="fas fa-play"></i> Xem Ngay</button>
                </div>`;
        }

        async function loadHomeRow(endpoint, title) {
            const res = await fetch(`${API}/${endpoint}?page=1`).then(r=>r.json());
            const movies = res.data.items || []; if(movies.length === 0) return;
            const id = `sec_${endpoint.replace(/\//g,'')}`;
            document.getElementById('homeSections').innerHTML += `
                <div class="group relative" id="${id}">
                    <div class="flex justify-between items-end mb-4 px-2"><h2 class="text-xl md:text-2xl font-bold text-white cursor-pointer hover:text-[#e50914] transition flex items-center gap-2" onclick="showCategory('${endpoint}', '${title}')"><span class="w-1 h-6 bg-[#e50914] rounded-full"></span> ${title} <i class="fas fa-chevron-right text-xs opacity-50 ml-1"></i></h2><span class="text-xs text-gray-400 font-bold uppercase cursor-pointer hover:text-white bg-[#222] px-2 py-1 rounded border border-white/10" onclick="showCategory('${endpoint}', '${title}')">Xem tất cả</span></div>
                    <div class="relative group/slider">
                        <button class="absolute left-0 top-1/2 -translate-y-1/2 z-20 w-12 h-full bg-gradient-to-r from-black to-transparent opacity-0 group-hover/slider:opacity-100 transition hidden md:flex items-center justify-start pl-2" onclick="document.getElementById('${id}_row').scrollBy({left:-window.innerWidth*0.7,behavior:'smooth'})"><i class="fas fa-chevron-left text-4xl text-white hover:text-[var(--primary)] transition drop-shadow-lg"></i></button>
                        <div class="flex gap-3 md:gap-4 overflow-x-auto hide-scroll snap-x pb-4 px-1 scroll-smooth" id="${id}_row">${movies.map(m => createCard(m)).join('')}</div>
                        <button class="absolute right-0 top-1/2 -translate-y-1/2 z-20 w-12 h-full bg-gradient-to-l from-black to-transparent opacity-0 group-hover/slider:opacity-100 transition hidden md:flex items-center justify-end pr-2" onclick="document.getElementById('${id}_row').scrollBy({left:window.innerWidth*0.7,behavior:'smooth'})"><i class="fas fa-chevron-right text-4xl text-white hover:text-[var(--primary)] transition drop-shadow-lg"></i></button>
                    </div>
                </div>`;
        }

        function createCard(m, isGrid=false) {
            const widthClass = isGrid ? 'w-full' : 'w-[140px] md:w-[220px] flex-shrink-0 snap-center';
            let epLabel = m.episode_current || m.quality || 'HD';
            let epBgColor = 'bg-[#e50914]'; 
            if (epLabel.toLowerCase().includes('trailer')) epBgColor = 'bg-gray-600'; 
            else if (epLabel.toLowerCase().includes('full') || epLabel.toLowerCase().includes('hoàn')) epBgColor = 'bg-green-600'; 
            else if (epLabel.toLowerCase().includes('tập')) epBgColor = 'bg-blue-600'; 

            return `
                <div onclick="playPhim('${m.slug}')" class="${widthClass} movie-card group cursor-pointer relative">
                    <div class="aspect-[2/3] rounded overflow-hidden bg-[#222] relative shadow-lg border border-white/5">
                        <img src="${getImgUrl(m.thumb_url)}" class="w-full h-full object-cover" onerror="handleImgError(this)" loading="lazy">
                        <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 transition flex items-center justify-center play-icon backdrop-blur-sm"><i class="fas fa-play-circle text-6xl text-[#e50914] scale-90 group-hover:scale-100 transition"></i></div>
                        <div class="absolute top-2 left-2 ${epBgColor} text-white text-[9px] md:text-[10px] font-bold px-1.5 py-0.5 rounded shadow-md uppercase tracking-wider">${epLabel}</div>
                        <div class="absolute top-2 right-2 bg-black/70 backdrop-blur-md border border-white/20 text-white text-[9px] md:text-[10px] font-bold px-1.5 py-0.5 rounded shadow-md">${m.year || 'New'}</div>
                        <div class="absolute bottom-0 left-0 w-full h-1/2 bg-gradient-to-t from-black to-transparent opacity-80"></div>
                    </div>
                    <div class="mt-2 px-1 relative z-10">
                        <h3 class="text-sm font-bold text-white truncate group-hover:text-[#e50914] transition">${m.name}</h3>
                        <p class="text-xs text-[#757575] truncate mt-0.5">${m.origin_name}</p>
                    </div>
                </div>`;
        }

        function showHome() { document.getElementById('homePage').classList.remove('hidden'); document.getElementById('categoryPage').classList.add('hidden'); document.getElementById('playerArea').classList.add('hidden'); closePlayer(); window.scrollTo(0,0); }
        function showCategory(endpoint, title) { currentEndpoint = endpoint; currentPage = 1; document.getElementById('homePage').classList.add('hidden'); document.getElementById('playerArea').classList.add('hidden'); document.getElementById('categoryPage').classList.remove('hidden'); document.getElementById('catTitle').innerText = title; document.getElementById('pagination').innerHTML = ''; closePlayer(); loadCategoryPage(); }
        function toggleMobileMenu() { document.getElementById('mobileMenu').classList.toggle('translate-x-full'); document.getElementById('menuBackdrop').classList.toggle('hidden'); }
        function toggleSearchOverlay() { document.getElementById('searchOverlay').classList.toggle('hidden'); document.getElementById('searchOverlay').classList.toggle('flex'); }
        function toggleAccordion(id) { document.getElementById(id).classList.toggle('hidden'); document.getElementById(id).classList.toggle('grid'); document.getElementById(`arrow_${id}`).style.transform = document.getElementById(id).classList.contains('grid') ? 'rotate(180deg)' : 'rotate(0deg)'; }
        function mobileNav(action) { toggleMobileMenu(); setTimeout(() => eval(action), 300); }

        init();
    </script>
</body>
</html>
