<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RyanPhim - TV Edition</title>
    <style>
        /* CSS CỔ ĐIỂN - ĐẢM BẢO CHẠY 100% TRÊN MÁY CHIẾU/TV CŨ */
        body { background-color: #141414; color: #ffffff; font-family: Arial, Helvetica, sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        * { box-sizing: border-box; }
        a { text-decoration: none; color: #ffffff; cursor: pointer; }
        
        /* Header */
        .header { background-color: #000000; padding: 15px; position: fixed; top: 0; width: 100%; z-index: 100; border-bottom: 2px solid #e50914; }
        .logo { color: #e50914; font-size: 24px; font-weight: bold; font-style: italic; float: left; margin-right: 30px; cursor: pointer; }
        .menu { float: left; margin-top: 5px; }
        .menu-item { display: inline-block; margin-right: 15px; font-weight: bold; color: #cccccc; cursor: pointer; padding: 5px; }
        .menu-item:hover, .menu-item:focus { color: #e50914; outline: 2px solid #e50914; }
        .search-box { float: right; margin-top: 2px; }
        .search-input { background: #333333; border: 1px solid #555; color: white; padding: 6px 10px; border-radius: 4px; width: 200px; }
        .search-btn { background: #e50914; color: white; border: none; padding: 6px 15px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .clear { clear: both; }

        /* Main */
        .container { padding: 80px 20px 20px 20px; min-height: 80vh; }
        .section-title { border-left: 5px solid #e50914; padding-left: 10px; font-size: 20px; text-transform: uppercase; margin-bottom: 15px; margin-top: 30px; }
        
        /* Grid Phim (Sử dụng float thay vì grid/flex để chống vỡ khung) */
        .movie-list { width: 100%; }
        .movie-card { width: 15%; float: left; margin: 0.8%; background: #222222; cursor: pointer; position: relative; border-radius: 4px; border: 1px solid #333; }
        .movie-card:focus { outline: 4px solid #e50914; transform: scale(1.05); z-index: 10; box-shadow: 0 0 20px #e50914; }
        .card-img { width: 100%; height: 250px; object-fit: cover; background: #000; border-top-left-radius: 4px; border-top-right-radius: 4px; }
        .badge { position: absolute; top: 5px; left: 5px; background: #e50914; color: #fff; font-size: 11px; padding: 2px 5px; font-weight: bold; border-radius: 3px; }
        .card-title { padding: 8px; font-size: 13px; font-weight: bold; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0; }

        /* Player Area */
        .player-area { display: none; background: #111111; margin-bottom: 30px; border: 2px solid #333; border-radius: 8px; padding: 15px; }
        .video-box { width: 100%; height: 60vh; background: #000; margin-bottom: 15px; }
        .video-box iframe { width: 100%; height: 100%; border: none; }
        .player-header { border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 10px; }
        .play-title { font-size: 24px; color: #e50914; margin: 0; display: inline-block; text-transform: uppercase; }
        .close-btn { float: right; background: #444; color: white; border: none; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .close-btn:focus { background: #e50914; outline: 2px solid white; }
        .play-desc { font-size: 14px; color: #aaaaaa; line-height: 1.5; }
        
        /* Episode Buttons */
        .episodes { margin-top: 15px; }
        .ep-btn { background: #333333; color: white; border: 1px solid #555; padding: 8px 12px; margin: 0 5px 5px 0; cursor: pointer; display: inline-block; font-weight: bold; border-radius: 3px; }
        .ep-btn:focus, .ep-btn:hover { background: #e50914; color: white; border-color: #e50914; outline: 2px solid white; }
        .ep-btn.active { background: #e50914; border-color: #e50914; }

        /* Phân trang */
        .pagination { text-align: center; margin-top: 30px; width: 100%; clear: both; padding-top: 20px; }
        .page-btn { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; margin: 0 5px; cursor: pointer; font-weight: bold; display: inline-block; }
        .page-btn:focus, .page-btn:hover { background: #e50914; border-color: #e50914; }

        /* Responsive cho Mobile */
        @media screen and (max-width: 1000px) { .movie-card { width: 23%; } .video-box { height: 40vh; } }
        @media screen and (max-width: 600px) { .movie-card { width: 46%; margin: 2%; } .menu { display: none; } .video-box { height: 30vh; } }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo" onclick="goHome()" tabindex="0">RYANPHIM</div>
        <div class="menu">
            <div class="menu-item" onclick="goHome()" tabindex="0">Trang Chủ</div>
            <div class="menu-item" onclick="loadList('danh-sach/phim-le', 'Phim Lẻ Cập Nhật')" tabindex="0">Phim Lẻ</div>
            <div class="menu-item" onclick="loadList('danh-sach/phim-bo', 'Phim Bộ Cập Nhật')" tabindex="0">Phim Bộ</div>
            <div class="menu-item" onclick="loadList('danh-sach/hoat-hinh', 'Hoạt Hình')" tabindex="0">Hoạt Hình</div>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" class="search-input" placeholder="Nhập tên phim...">
            <button class="search-btn" onclick="doSearch()" tabindex="0">Tìm</button>
        </div>
        <div class="clear"></div>
    </div>

    <div class="container">
        
        <div id="playerArea" class="player-area">
            <div class="player-header">
                <h2 id="playTitle" class="play-title">Đang tải...</h2>
                <button class="close-btn" onclick="closePlayer()" tabindex="0">X Đóng Phim</button>
                <div class="clear"></div>
            </div>
            <div class="video-box">
                <iframe id="mainIframe" src="" allowfullscreen></iframe>
            </div>
            <div id="epList" class="episodes"></div>
            <p id="playDesc" class="play-desc"></p>
        </div>

        <div id="homePage">
            <h2 class="section-title">Phim Mới Cập Nhật</h2>
            <div id="newMovies" class="movie-list"><h3 style="color:yellow;">Đang kết nối máy chủ...</h3></div>
            <div class="clear"></div>

            <h2 class="section-title">Hành Động Bom Tấn</h2>
            <div id="actionMovies" class="movie-list"></div>
            <div class="clear"></div>
        </div>

        <div id="listPage" style="display: none;">
            <h2 id="listTitle" class="section-title">Danh Mục</h2>
            <div id="listGrid" class="movie-list"></div>
            <div class="clear"></div>
            <div id="pagination" class="pagination"></div>
        </div>

    </div>

    <script>
        var API_URL = 'https://ophim1.com/v1/api';
        var IMG_DOMAIN = 'https://img.ophim.live/uploads/movies/';
        var currentEndpoint = '';
        var currentPage = 1;

        // Hàm Tải Dữ Liệu An Toàn (XMLHttpRequest thay cho fetch)
        function ajaxGet(url, callback) {
            var xhr = new XMLHttpRequest();
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        try {
                            var data = JSON.parse(xhr.responseText);
                            callback(data);
                        } catch(e) { console.log("Lỗi xử lý dữ liệu"); }
                    } else {
                        console.log("Lỗi mạng");
                    }
                }
            };
            xhr.open("GET", url, true);
            xhr.send();
        }

        // Fix lỗi ảnh
        function getSafeImg(thumb) {
            if (!thumb) return 'https://via.placeholder.com/300x450?text=Loi+Anh';
            if (thumb.indexOf('http') === 0) return thumb;
            if (thumb.charAt(0) === '/') thumb = thumb.substring(1);
            return IMG_DOMAIN + thumb;
        }

        // Tạo thẻ Phim HTML (Nối chuỗi thay vì dùng dấu backtick)
        function createCardHtml(m) {
            var bgBadge = '#e50914';
            var epLabel = m.episode_current || 'HD';
            if (epLabel.toLowerCase().indexOf('full') > -1 || epLabel.toLowerCase().indexOf('hoàn') > -1) {
                bgBadge = 'green';
            } else if (epLabel.toLowerCase().indexOf('trailer') > -1) {
                bgBadge = 'gray';
            }

            var html = '<div class="movie-card" onclick="openPlayer(\'' + m.slug + '\')" tabindex="0">';
            html += '<img class="card-img" src="' + getSafeImg(m.thumb_url) + '" onerror="this.src=\'https://via.placeholder.com/300x450?text=RyanPhim\'">';
            html += '<div class="badge" style="background-color:' + bgBadge + '">' + epLabel + '</div>';
            html += '<p class="card-title">' + m.name + '</p>';
            html += '</div>';
            return html;
        }

        // Khởi động Trang Chủ
        function init() {
            // Tải Phim Mới
            ajaxGet(API_URL + '/danh-sach/phim-moi-cap-nhat?page=1', function(data) {
                if(data.data && data.data.APP_DOMAIN_CDN_IMAGE) IMG_DOMAIN = data.data.APP_DOMAIN_CDN_IMAGE + '/';
                var items = data.data.items;
                var html = '';
                for(var i=0; i<12; i++) { if(items[i]) html += createCardHtml(items[i]); }
                document.getElementById('newMovies').innerHTML = html;
            });

            // Tải Phim Hành Động
            ajaxGet(API_URL + '/the-loai/hanh-dong?page=1', function(data) {
                var items = data.data.items;
                var html = '';
                for(var i=0; i<12; i++) { if(items[i]) html += createCardHtml(items[i]); }
                document.getElementById('actionMovies').innerHTML = html;
            });

            // Gắn phím Enter cho ô tìm kiếm
            document.getElementById('searchInput').onkeydown = function(e) {
                if(e.keyCode === 13) doSearch();
            };
        }

        // Mở Phim
        function openPlayer(slug) {
            document.getElementById('playerArea').style.display = 'block';
            window.scrollTo(0, 0);
            document.getElementById('playTitle').innerText = "Đang tải phim...";
            document.getElementById('epList').innerHTML = "";
            document.getElementById('mainIframe').src = "";

            ajaxGet(API_URL + '/phim/' + slug, function(data) {
                if(!data || !data.data || !data.data.item) {
                    alert("Lỗi tải phim!"); return;
                }
                var item = data.data.item;
                document.getElementById('playTitle').innerText = item.name;
                
                // Lọc bỏ thẻ HTML trong mô tả
                var desc = item.content || "";
                desc = desc.replace(/<[^>]*>?/gm, '');
                document.getElementById('playDesc').innerText = desc;

                var eps = item.episodes[0].server_data;
                var btnHtml = '';
                for(var i=0; i<eps.length; i++) {
                    var cls = (i === 0) ? "ep-btn active" : "ep-btn";
                    btnHtml += '<button class="' + cls + '" onclick="playEp(this, \'' + eps[i].link_embed + '\')" tabindex="0">' + eps[i].name + '</button>';
                }
                document.getElementById('epList').innerHTML = btnHtml;
                
                // Tự động phát tập 1
                document.getElementById('mainIframe').src = eps[0].link_embed;
            });
        }

        // Chọn tập
        function playEp(btnObj, link) {
            document.getElementById('mainIframe').src = link;
            var btns = document.getElementsByClassName('ep-btn');
            for(var i=0; i<btns.length; i++) { btns[i].className = 'ep-btn'; }
            btnObj.className = 'ep-btn active';
        }

        // Đóng phim
        function closePlayer() {
            document.getElementById('playerArea').style.display = 'none';
            document.getElementById('mainIframe').src = '';
        }

        function goHome() {
            closePlayer();
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('listPage').style.display = 'none';
        }

        function doSearch() {
            var kw = document.getElementById('searchInput').value;
            if(kw && kw.trim() !== "") {
                loadList('tim-kiem?keyword=' + encodeURIComponent(kw.trim()), 'TÌM KIẾM: ' + kw);
                document.getElementById('searchInput').blur();
            } else {
                alert("Vui lòng nhập tên phim!");
            }
        }

        // Tải danh sách phim (Thể loại / Tìm kiếm)
        function loadList(endpoint, title) {
            closePlayer();
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('listPage').style.display = 'block';
            document.getElementById('listTitle').innerText = title;
            document.getElementById('listGrid').innerHTML = '<h3 style="color:yellow; text-align:center;">Đang tải...</h3>';
            document.getElementById('pagination').innerHTML = '';
            
            currentEndpoint = endpoint;
            currentPage = 1;
            fetchPageData();
        }

        function fetchPageData() {
            var separator = currentEndpoint.indexOf('?') > -1 ? '&' : '?';
            var url = API_URL + '/' + currentEndpoint + separator + 'page=' + currentPage;
            
            ajaxGet(url, function(data) {
                var items = data.data.items;
                if(!items || items.length === 0) {
                    document.getElementById('listGrid').innerHTML = '<p style="text-align:center;">Không tìm thấy phim.</p>';
                    return;
                }
                
                var html = '';
                for(var i=0; i<items.length; i++) {
                    html += createCardHtml(items[i]);
                }
                document.getElementById('listGrid').innerHTML = html;

                // Tạo nút phân trang đơn giản
                var pagHtml = '';
                if(currentPage > 1) {
                    pagHtml += '<button class="page-btn" onclick="changePage(' + (currentPage - 1) + ')" tabindex="0">< Trước</button>';
                }
                pagHtml += '<button class="page-btn active" style="background:#e50914;">Trang ' + currentPage + '</button>';
                pagHtml += '<button class="page-btn" onclick="changePage(' + (currentPage + 1) + ')" tabindex="0">Sau ></button>';
                
                document.getElementById('pagination').innerHTML = pagHtml;
            });
        }

        function changePage(p) {
            currentPage = p;
            window.scrollTo(0, 0);
            fetchPageData();
        }

        // Chạy khởi tạo ngay lập tức
        init();

    </script>
</body>
</html>
